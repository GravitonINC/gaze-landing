<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="-30 -30 340 340">
  <defs>
    <linearGradient id="eye-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b2c"/>
      <stop offset="50%" stop-color="#ffb800"/>
      <stop offset="100%" stop-color="#ff3366"/>
    </linearGradient>
    <radialGradient id="iris-glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ffb800" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ff6b2c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff6b2c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core-glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ffb800" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6b2c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="heat-blur">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="outer-heat">
      <feGaussianBlur stdDeviation="15"/>
    </filter></defs>
  <rect x="-30" y="-30" width="340" height="340" fill="#080604"/>
  
    <!-- Deep ambient glow -->
    <circle cx="140" cy="140" r="95.0" fill="url(#iris-glow)" opacity="0.9"/>
    <!-- Outer heat glow -->
    <circle cx="140" cy="140" r="70.0" fill="#ff6b2c" opacity="0.07" filter="url(#outer-heat)"/>
    <!-- Outer eye shape -->
    <path d="M40.0 140 Q140 55.0 240.0 140" fill="none" stroke="url(#eye-grad)" stroke-width="3.0" stroke-linecap="round" filter="url(#soft-glow)"/>
    <path d="M40.0 140 Q140 225.0 240.0 140" fill="none" stroke="url(#eye-grad)" stroke-width="3.0" stroke-linecap="round" filter="url(#soft-glow)"/>
    <!-- Secondary contour -->
    <path d="M60.0 140 Q140 78.0 220.0 140" fill="none" stroke="#ff6b2c" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
    <path d="M60.0 140 Q140 202.0 220.0 140" fill="none" stroke="#ff6b2c" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
    <!-- Iris ring -->
    <circle cx="140" cy="140" r="30.0" fill="none" stroke="url(#eye-grad)" stroke-width="2.0" opacity="0.85"/>
    <!-- Inner iris ring -->
    <circle cx="140" cy="140" r="22.0" fill="none" stroke="#ffb800" stroke-width="0.8" opacity="0.4"/>
    <!-- Core glow -->
    <circle cx="140" cy="140" r="20.0" fill="url(#core-glow)" filter="url(#heat-blur)"/>
    <!-- Pupil -->
    <circle cx="140" cy="140" r="10.0" fill="#ffb800"/>
    <!-- Pupil bright core -->
    <circle cx="140" cy="140" r="4.5" fill="#fff" opacity="0.25"/>
    <!-- Light refractions -->
    <circle cx="132.0" cy="131.0" r="3.0" fill="#fff" opacity="0.7"/>
    <circle cx="150.0" cy="137.0" r="1.5" fill="#fff" opacity="0.35"/>
</svg>