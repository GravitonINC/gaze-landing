name: Apply IAM Policy (one-time setup)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/iam-policy-github-actions.json'
      - 'infra/apply-iam-policy.sh'

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: Apply GithubActionsS3Deploy policy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (admin)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Apply IAM policy to github-actions-user
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: bash infra/apply-iam-policy.sh
