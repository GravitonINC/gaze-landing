name: Apply IAM Policy (one-time setup)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/iam-policy-github-actions.json'
      - 'infra/apply-iam-policy.sh'

jobs:
  apply:
    name: Apply GithubActionsS3Deploy policy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (admin)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ADMIN_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ADMIN_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Apply IAM policy to github-actions-user
        run: bash infra/apply-iam-policy.sh
