name: Apply IAM Policy (admin only)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: Apply GithubActionsS3Deploy policy
    runs-on: ubuntu-latest
    environment: admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (admin)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ADMIN_ROLE_ARN }}
          aws-region: us-east-1

      - name: Apply IAM policy to github-actions-user
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: bash infra/apply-iam-policy.sh
