name: Apply IAM Policy (admin only)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: Apply GithubActionsS3Deploy policy
    runs-on: ubuntu-latest
    environment: infra-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (admin)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ADMIN_ROLE_ARN }}
          aws-region: us-east-1

      - name: Validate assumed role has IAM permissions
        run: |
          CALLER=$(aws sts get-caller-identity --output json)
          ASSUMED_ROLE=$(echo "$CALLER" | jq -r '.Arn')
          echo "Assumed role: $ASSUMED_ROLE"

          if echo "$ASSUMED_ROLE" | grep -q "gaze-landing-github-deploy"; then
            echo "ERROR: Running as the deploy role, not an admin role."
            echo "The AWS_INFRA_ADMIN_ROLE_ARN secret in the 'infra-admin' environment"
            echo "must be set to a role with iam:CreatePolicy / iam:PutUserPolicy permissions."
            echo "See infra/README.md for setup instructions."
            exit 1
          fi

      - name: Apply IAM policy to github-actions-user
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: bash infra/apply-iam-policy.sh
